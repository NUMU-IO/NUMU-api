name: Promote

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Promote to which environment?"
        required: true
        type: choice
        options:
          - stage   # merges dev → stage  (triggers stage deploy)
          - prod      # merges stage → prod  (triggers prod deploy)

jobs:
  promote:
    name: Promote ${{ github.event.inputs.environment == 'stage' && 'dev → stage' || 'stage → prod' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Promote to stage (dev → stage)
        if: github.event.inputs.environment == 'stage'
        run: |
          git checkout stage
          git merge --ff-only origin/dev
          git push origin stage

      - name: Promote to prod (stage → prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          git checkout prod
          git merge --ff-only origin/stage
          git push origin prod
