name: CI

on:
  push:
    branches: [dev, stage, prod]
  pull_request:
    branches: [dev, stage, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check src/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-types:
    name: Generate TypeScript Types
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Start API server
        env:
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          SESSION_SECRET_KEY: "test-session-secret-key-for-ci-minimum-32-chars"
          ENVIRONMENT: development
          REDIS_HOST: localhost
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          # Wait until /openapi.json is available (max 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/openapi.json > /dev/null && break
            sleep 1
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate TypeScript types
        working-directory: packages/api-types
        run: |
          npm install
          npm run generate

      - name: Verify types generated
        run: |
          test -f packages/api-types/dist/index.ts || (echo "Types file not generated!" && exit 1)
          echo "TypeScript types generated successfully"
          wc -l packages/api-types/dist/index.ts

      - name: Upload generated types
        uses: actions/upload-artifact@v4
        with:
          name: api-types
          path: packages/api-types/dist/
