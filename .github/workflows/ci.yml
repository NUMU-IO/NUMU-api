name: CI

on:
  push:
    branches: [main, dev, staging, prod]
  pull_request:
    branches: [main, dev, staging, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff check
        run: ruff check src/

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        env:
          JWT_PRIVATE_KEY: "dummy"
          JWT_PUBLIC_KEY: "dummy"
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          SESSION_SECRET_KEY: "test-session-secret-key-for-ci-minimum-32-chars"
        run: mypy src/ --ignore-missing-imports --no-error-summary

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: numu_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: numu_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          SESSION_SECRET_KEY: "test-session-secret-key-for-ci-minimum-32-chars"
          ENVIRONMENT: development
        run: pytest -x -q --tb=short --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [type-check, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-types:
    name: Generate TypeScript Types
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: pip install -e ".[dev]"

      - name: Start API server
        env:
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          SESSION_SECRET_KEY: "test-session-secret-key-for-ci-minimum-32-chars"
          ENVIRONMENT: development
          REDIS_HOST: localhost
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          # Wait until /openapi.json is available (max 30s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/openapi.json > /dev/null && break
            sleep 1
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate TypeScript types
        working-directory: packages/api-types
        run: |
          npm install
          npm run generate

      - name: Verify types generated
        run: |
          test -f packages/api-types/dist/index.ts || (echo "Types file not generated!" && exit 1)
          echo "TypeScript types generated successfully"
          wc -l packages/api-types/dist/index.ts

      - name: Upload generated types
        uses: actions/upload-artifact@v4
        with:
          name: api-types
          path: packages/api-types/dist/
