name: CI

on:
  push:
    branches: [dev, stage, prod]
  pull_request:
    branches: [dev, stage, prod]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          JWT_ALGORITHM: "HS256"
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term -x

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  performance-test:
    name: Performance Tests (k6)
    runs-on: ubuntu-latest
    needs: test
    # Only run on main branches, not on every PR
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/stage')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install aiosqlite

      - name: Start API server
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          JWT_ALGORITHM: "HS256"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 10  # Wait for server to start

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Create results directory
        run: mkdir -p tests/performance/k6/results

      - name: Run k6 load test
        env:
          API_URL: "http://localhost:8000"
          STORE_ID: "00000000-0000-0000-0000-000000000001"
          ENVIRONMENT: "ci"
        run: |
          k6 run tests/performance/k6/api-load-test.js \
            --out json=tests/performance/k6/results/results.json \
            || echo "Performance test completed with warnings"

      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: tests/performance/k6/results/

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const summary = fs.readFileSync('tests/performance/k6/results/summary.json', 'utf8');
              const data = JSON.parse(summary);
              const metrics = data.metrics;

              let comment = '## 🚀 Performance Test Results\n\n';
              comment += '| Metric | Value | Threshold |\n';
              comment += '|--------|-------|----------|\n';

              if (metrics.http_req_duration) {
                const p95 = metrics.http_req_duration.values['p(95)'].toFixed(2);
                comment += `| HTTP p95 | ${p95}ms | <2000ms |\n`;
              }
              if (metrics.http_req_failed) {
                const errRate = (metrics.http_req_failed.values.rate * 100).toFixed(2);
                comment += `| Error Rate | ${errRate}% | <1% |\n`;
              }

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not parse performance results:', e);
            }

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
