name: Notify Slack on Commit

on:
  push:
    branches:
      - dev
      - master
      - stage
      - prod
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: commit-info
        run: |
          # Get commit message and properly escape it
          COMMIT_MSG=$(git log -1 --pretty=%B)
          # Use printf to properly handle the message
          {
            echo "message<<EOF"
            echo "$COMMIT_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          # Get short SHA
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
          # Get files changed
          FILES_CHANGED=$(git diff-tree --no-commit-id --name-only -r HEAD | wc -l)
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          
          # Determine commit type emoji
          if echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)"; then
            echo "emoji=✨" >> $GITHUB_OUTPUT
            echo "type=Feature" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^fix"; then
            echo "emoji=🐛" >> $GITHUB_OUTPUT
            echo "type=Bug Fix" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(docs|doc)"; then
            echo "emoji=📝" >> $GITHUB_OUTPUT
            echo "type=Documentation" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(refactor|refact)"; then
            echo "emoji=♻️" >> $GITHUB_OUTPUT
            echo "type=Refactor" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^test"; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "type=Test" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(chore|build|ci)"; then
            echo "emoji=🔧" >> $GITHUB_OUTPUT
            echo "type=Chore" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^perf"; then
            echo "emoji=⚡" >> $GITHUB_OUTPUT
            echo "type=Performance" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(hotfix|urgent)"; then
            echo "emoji=🔥" >> $GITHUB_OUTPUT
            echo "type=Hotfix" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^merge"; then
            echo "emoji=🔀" >> $GITHUB_OUTPUT
            echo "type=Merge" >> $GITHUB_OUTPUT
          else
            echo "emoji=📦" >> $GITHUB_OUTPUT
            echo "type=Update" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "text": "${{ steps.commit-info.outputs.emoji }} New commit pushed to ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.commit-info.outputs.emoji }} ${{ steps.commit-info.outputs.type }} Commit to ${{ github.ref_name }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.event.pusher.name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n`${{ steps.commit-info.outputs.short_sha }}`"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Commit Message:*\n```\n${{ steps.commit-info.outputs.message }}\n```"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Commit"
                      },
                      "url": "${{ github.event.head_commit.url }}",
                      "style": "primary"
                    },
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Repository"
                      },
                      "url": "${{ github.event.repository.html_url }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "${{ steps.commit-info.outputs.files_changed }} files changed"
                    }
                  ]
                }
              ]
            }
