name: CD

on:
  push:
    branches: [staging, prod]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/numu

            echo "==> Pulling latest images..."
            docker compose -f docker/docker-compose.staging.yml pull

            echo "==> Starting services..."
            docker compose -f docker/docker-compose.staging.yml up -d

            echo "==> Running database migrations..."
            docker compose -f docker/docker-compose.staging.yml exec -T api alembic upgrade head

            echo "==> Verifying health..."
            sleep 10
            curl -f http://localhost:8000/api/v1/health || echo "Health check pending..."

            echo "==> Deployment complete."
          DEPLOY_SCRIPT

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/prod' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Deploy to production VPS
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd /opt/numu

            echo "==> Pulling latest images..."
            docker compose -f docker/docker-compose.prod.yml pull

            echo "==> Starting services..."
            docker compose -f docker/docker-compose.prod.yml up -d

            echo "==> Running database migrations..."
            docker compose -f docker/docker-compose.prod.yml exec -T api alembic upgrade head

            echo "==> Verifying health..."
            sleep 10
            curl -f http://localhost:8000/api/v1/health || echo "Health check pending..."

            echo "==> Production deployment complete."
          DEPLOY_SCRIPT
