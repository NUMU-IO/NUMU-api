name: Security Scans

on:
  push:
    branches: [dev, stage, prod]
  pull_request:
    branches: [dev, stage, prod]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (HIGH/MEDIUM only)
        run: |
          bandit -r src/ -ll -ii \
            --exclude tests,alembic/versions \
            -f txt

  safety:
    name: Safety Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" safety

      - name: Run Safety check
        run: |
          pip freeze > requirements-freeze.txt
          safety check -r requirements-freeze.txt --output text

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    # Only run on PRs targeting stage (staging deployment)
    if: github.event_name == 'pull_request' && github.base_ref == 'stage'
    needs: [bandit, safety]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" aiosqlite

      - name: Start API server
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET_KEY: "test-secret-key-for-ci-minimum-32-characters"
          JWT_ALGORITHM: "HS256"
          DEBUG: "false"
        run: |
          uvicorn src.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8000/"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html
