installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before clarification?
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before planning?
    description: Auto-commit before implementation planning
    condition: null
  - extension: version-guard
    command: speckit.version-guard.check
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.check?
    description: Verify tech stack versions and write constraints before planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before task generation?
    description: Auto-commit before task generation
    condition: null
  - extension: version-guard
    command: speckit.version-guard.load
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.load?
    description: Load version guard constraints into context before task generation
    condition: null
  - extension: plan-review-gate
    command: speckit.plan-review-gate.check
    enabled: true
    optional: false
    prompt: Execute speckit.plan-review-gate.check?
    description: Require a merge request before proceeding to task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before implementation?
    description: Auto-commit before implementation
    condition: null
  - extension: version-guard
    command: speckit.version-guard.load
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.load?
    description: Load version guard constraints into context before code generation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before checklist?
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before analysis?
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit outstanding changes before issue sync?
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit constitution changes?
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit specification changes?
    description: Auto-commit after specification
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit clarification changes?
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit plan changes?
    description: Auto-commit after implementation planning
    condition: null
  - extension: security-review
    command: speckit.security-review.plan
    enabled: true
    optional: true
    prompt: Would you like to perform a security review on the proposed technical
      plan?
    description: ''
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit task changes?
    description: Auto-commit after task generation
    condition: null
  - extension: security-review
    command: speckit.security-review.tasks
    enabled: true
    optional: true
    prompt: Would you like to verify that security boundaries are represented in the
      tasks?
    description: ''
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit implementation changes?
    description: Auto-commit after implementation
    condition: null
  - extension: security-review
    command: speckit.security-review.branch
    enabled: true
    optional: true
    prompt: Would you like to scan the new implementation for security vulnerabilities?
    description: ''
    condition: null
  - extension: version-guard
    command: speckit.version-guard.validate
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.validate?
    description: Scan generated code for version-incompatible API patterns
    condition: null
  - extension: ship
    command: speckit.ship.run
    enabled: true
    optional: true
    prompt: Ship this feature?
    description: Runs pre-flight checks, syncs branches, generates changelog, and
      creates PR
    condition: null
  - extension: retrospective
    command: speckit.retrospective.analyze
    enabled: true
    optional: true
    prompt: Run retrospective analysis now? (spec changes require explicit confirmation)
    description: Offer a retrospective after implementation without modifying spec
      unless approved.
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit checklist changes?
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit analysis results?
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: true
    prompt: Commit after syncing issues?
    description: Auto-commit after tasks-to-issues conversion
    condition: null
  after_init:
  - extension: brownfield
    command: speckit.brownfield.scan
    enabled: true
    optional: true
    prompt: Scan this existing project to customize spec-kit configuration?
    description: Auto-scan project after spec-kit init to detect tech stack and conventions
    condition: null
