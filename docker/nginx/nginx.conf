# =============================================================================
# NUMU API - Nginx Configuration
# =============================================================================
# Requires custom Nginx image with Brotli module (see docker/nginx/Dockerfile)

# Load Brotli dynamic modules (compiled in docker/nginx/Dockerfile)
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with request timing
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ETag support for conditional requests (304 Not Modified)
    etag on;

    # Gzip compression (fallback for clients that don't support Brotli)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Brotli compression (preferred over gzip — better ratio at similar CPU cost)
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css text/xml application/json application/javascript
                 application/xml application/xml+rss text/javascript application/x-javascript;
    brotli_static on;

    # Security headers (inherited by every server block)
    # HSTS: 1-year max-age with preload — safe once ssl is stable on numueg.app + subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # NOTE: X-XSS-Protection removed — deprecated in all modern browsers; CSP replaces it.

    # Skip rate limiting for CORS preflight requests (OPTIONS method)
    map $request_method $auth_limit_key {
        OPTIONS  "";
        default  $binary_remote_addr;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $auth_limit_key zone=auth_limit:10m rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Embedded Docker DNS (always 127.0.0.11). Used by `proxy_pass $variable`
    # forms in test/stage server blocks so nginx can boot without those
    # containers running yet.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Upstream API servers (apex / staging.yml stack — same docker network as nginx)
    upstream numu_api {
        server api:8000;
        keepalive 32;
    }

    # Test/stage stacks (api, minio, storefront) live on the shared `numu-edge`
    # network and may not be running when this nginx starts. Use Docker's
    # embedded DNS (127.0.0.11) with `set $upstream` + `proxy_pass $upstream`
    # in each location block — that defers resolution to request time, so
    # `nginx -t` never blocks on a stopped container.

    # =========================================================================
    # HTTP Server — redirect to HTTPS + ACME challenge
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name numueg.app www.numueg.app admin.numueg.app _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (allow over HTTP for Docker healthcheck)
        location /api/v1/health {
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS Server
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name numueg.app admin.numueg.app;

        ssl_certificate     /etc/letsencrypt/live/numueg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/numueg.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Request size limits
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Health check endpoint (no rate limiting)
        location /api/v1/health {
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoints (strict rate limiting)
        location /api/v1/auth {
            limit_req zone=auth_limit burst=15 nodelay;
            limit_conn conn_limit 5;

            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Webhook endpoints (no rate limiting - external services)
        location /api/v1/webhooks {
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            client_max_body_size 5M;
        }

        # Storefront public endpoints — cacheable
        location /api/v1/storefront/store-by-subdomain/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            set $cache_control "no-store, max-age=0";
            if ($http_authorization = "") {
                set $cache_control "public, max-age=60, stale-while-revalidate=30";
            }
            add_header Cache-Control $cache_control always;
            add_header Vary "Accept-Encoding, Authorization" always;
        }

        # Product catalog
        location ~ ^/api/v1/storefront/store/[^/]+/products {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            set $cache_control "no-store, max-age=0";
            if ($http_authorization = "") {
                set $cache_control "public, max-age=60, stale-while-revalidate=30";
            }
            add_header Cache-Control $cache_control always;
            add_header Vary "Accept-Encoding, Authorization" always;
        }

        # Admin panel
        location /admin {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # API endpoints (standard rate limiting)
        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Swagger / ReDoc / OpenAPI schema
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Order-link redirector (backend-030 / FR-007). WhatsApp template
        # CTA buttons point at numueg.app/o/<order_id>; FastAPI resolves
        # the order's store + 302s to the tenant storefront's
        # /track/<id> page. Mounted at the app root in main.py.
        location ~ ^/o/[0-9a-fA-F-]+/?$ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        # Redirect legacy /api/v1/uploads/ URLs to /uploads/
        location /api/v1/uploads/ {
            rewrite ^/api/v1/uploads/(.*)$ /uploads/$1 permanent;
        }

        # Serve uploaded files from MinIO
        location /uploads/ {
            proxy_pass http://minio:9000/numu/;
            proxy_set_header Host minio:9000;
            proxy_hide_header x-amz-request-id;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 1y;
        }

        # Root redirect to API docs


        # =====================================================================
        # Landing page (prerendered SSG) — served from /var/www/landing-page.
        # Build pipeline runs `npm run build:ssg` which writes one index.html per
        # route (e.g. /pricing/index.html). try_files hits those first and only
        # falls back to the root SPA for unknown paths.
        # =====================================================================

        # Content-Security-Policy for the landing site. Loosened only for what the
        # current bundle needs (Sentry, Google Fonts, Paymob/Kashier iframes).
        # Kept out of the global http {} block because the /api upstream needs
        # different policies.
        set $landing_csp "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://*.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://numueg.app https://*.numueg.app https://*.sentry.io https://*.ingest.sentry.io https://accounts.google.com; frame-src https://accounts.google.com https://*.paymob.com https://*.kashier.io; worker-src 'self' blob:; upgrade-insecure-requests";

        # Nginx `add_header` rule: once a location sets any add_header, it STOPS
        # inheriting from outer blocks. We therefore redeclare the baseline security
        # headers (HSTS, X-Frame-Options, etc.) in each landing location that adds
        # Cache-Control or CSP. Keep this block of headers in sync with the http {} level.

        # Hashed build assets — immutable, 1-year cache
        location ~* ^/assets/.+\.(js|mjs|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico|map)$ {
            root /var/www/landing-page;
            access_log off;
            try_files $uri =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Root-level static images (logos, OG image, favicon copies) — not hashed
        # so cache for 7 days + allow stale-while-revalidate. Fixes the Lighthouse
        # "efficient cache lifetimes" warning without breaking logo swaps.
        location ~* ^/[^/]+\.(png|jpe?g|gif|webp|avif|svg|ico)$ {
            root /var/www/landing-page;
            access_log off;
            try_files $uri =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        }

        # llms.txt — plain text, short cache, no SPA fallback
        location = /llms.txt {
            root /var/www/landing-page;
            default_type text/plain;
            charset utf-8;
            try_files $uri =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cache-Control "public, max-age=3600" always;
        }

        # robots.txt + sitemap.xml — correct MIME types, short cache
        location = /robots.txt {
            root /var/www/landing-page;
            default_type text/plain;
            try_files $uri =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location = /sitemap.xml {
            root /var/www/landing-page;
            default_type application/xml;
            try_files $uri =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, max-age=3600" always;
        }

        # Prerendered HTML routes — short TTL so deploys go live immediately,
        # stale-while-revalidate keeps users fast. Unknown paths get a real
        # 404 served from the prerendered /404/index.html (no soft-404).
        location / {
            root /var/www/landing-page;
            index index.html;
            # Exact file → prerendered /<route>/index.html → real 404.
            try_files $uri $uri/index.html $uri/ =404;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
            add_header Content-Security-Policy $landing_csp always;
            add_header Cache-Control "public, max-age=300, stale-while-revalidate=60" always;
        }

        # Real 404 page — served with status 404, not 200, so Googlebot drops
        # non-existent URLs from its queue instead of treating every garbage
        # URL as a duplicate of the homepage.
        error_page 404 /404/index.html;
        location = /404/index.html {
            root /var/www/landing-page;
            internal;

            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy $landing_csp always;
            add_header Cache-Control "no-store" always;
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # =========================================================================
    # Merchant Hub — merchant.numueg.app
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name merchant.numueg.app;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name merchant.numueg.app;

        ssl_certificate     /etc/letsencrypt/live/numueg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/numueg.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/merchant-hub;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }

        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://numu_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }
    }

    # =========================================================================
    # www redirect — 301 to canonical non-www
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name www.numueg.app;

        ssl_certificate     /etc/letsencrypt/live/numueg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/numueg.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        return 301 https://numueg.app$request_uri;
    }

    # =========================================================================
    # HTTP-side blocks for test/staging — Cloudflare in Flexible SSL mode
    # connects to origin over HTTP. These mirror the HTTPS blocks below so
    # routing works regardless of CF's SSL mode (Flexible / Full / Strict).
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name test.numueg.app merchant-test.numueg.app
                    "~^[^.]+-test\.numueg\.app$";

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            set $api_upstream http://numu-api-test:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }

        location /uploads/ {
            set $minio_upstream http://numu-minio-test:9000/numu/;
            proxy_pass $minio_upstream;
            proxy_set_header Host numu-minio-test:9000;
            proxy_hide_header x-amz-request-id;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 1y;
        }

        # Everything else → HTTPS (browsers will pick it up; CF Flexible mode
        # will serve the HTTP body directly).
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name staging.numueg.app merchant-staging.numueg.app
                    "~^[^.]+-staging\.numueg\.app$";

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api {
            limit_req zone=api_limit burst=50 nodelay;
            set $api_upstream http://numu-api-stage:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }

        location /uploads/ {
            set $minio_upstream http://numu-minio-stage:9000/numu/;
            proxy_pass $minio_upstream;
            proxy_set_header Host numu-minio-stage:9000;
            proxy_hide_header x-amz-request-id;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            expires 1y;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # test.numueg.app — Test API + landing
    # SSL: apex *.numueg.app wildcard cert (covers all level-1 subdomains).
    # CF Universal SSL also only covers level-1, so flat URLs are mandatory.
    # =========================================================================
    server {
        listen 443 ssl;
        http2 on;
        listen [::]:443 ssl;
        server_name test.numueg.app;

        ssl_certificate     /etc/letsencrypt/live/numueg.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/numueg.app/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location /api/v1/health {
            set $api_upstream http://numu-api-test:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/auth {
            limit_req zone=auth_limit burst=15 nodelay;
            limit_conn conn_limit 5;
            set $api_upstream http://numu-api-test:8000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
        }

        location /api/v1/webhooks {
