# =============================================================================
# Redis Sentinel Configuration for NUMU Staging
# =============================================================================

# Sentinel port
port 26379

# Monitor the master
# sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor numu-master redis-master 6379 2

# Authentication
sentinel auth-pass numu-master ${REDIS_PASSWORD}

# Down after milliseconds - time to consider master down
sentinel down-after-milliseconds numu-master 5000

# Failover timeout
sentinel failover-timeout numu-master 60000

# Parallel syncs - how many replicas to reconfigure at once
sentinel parallel-syncs numu-master 1

# Notification script (optional)
# sentinel notification-script numu-master /var/redis/notify.sh

# Client reconfiguration script (optional)
# sentinel client-reconfig-script numu-master /var/redis/reconfig.sh

# Logging
loglevel notice
logfile ""
