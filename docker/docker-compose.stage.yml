# =============================================================================
# NUMU API - Stage Environment (staging.numueg.app)
# =============================================================================
# Triggered by pushes to the `stage` branch.
# Runs alongside docker-compose.test.yml and docker-compose.staging.yml.
#   - No host port bindings (Postgres/Redis/MinIO stay container-internal)
#   - Joined to the external `numu-edge` network so the shared nginx in the
#     staging stack can reach `numu-api-stage:8000` / `numu-storefront-stage:3000`.
#   - Volumes namespaced with `_stage` suffix.

services:
  api:
    image: ${NUMU_API_IMAGE:?NUMU_API_IMAGE must be set}
    container_name: numu-api-stage
    restart: unless-stopped
    env_file:
      - ../.env.stage
    environment:
      - ENVIRONMENT=staging
      - DEBUG=false
      - LOG_FORMAT=json
    expose:
      - "8000"
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - numu-stage
      - numu-edge
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  postgres:
    image: postgres:16-alpine
    container_name: numu-postgres-stage
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-numu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-numu_stage}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres/init-wal-archiving.sh:/docker-entrypoint-initdb.d/init-wal-archiving.sh:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - numu-stage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-numu} -d ${POSTGRES_DB:-numu_stage}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  minio:
    image: minio/minio:latest
    container_name: numu-minio-stage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - numu-stage
      - numu-edge
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis-master:
    image: redis:7-alpine
    container_name: numu-redis-master-stage
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data
    networks:
      - numu-stage
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: ${NUMU_API_IMAGE:?NUMU_API_IMAGE must be set}
    container_name: numu-celery-worker-stage
    restart: unless-stopped
    command: celery -A src.infrastructure.messaging.celery_app worker --loglevel=info
    env_file:
      - ../.env.stage
    environment:
      - ENVIRONMENT=staging
      - LOG_FORMAT=json
      - PROCESS_ROLE=celery
    depends_on:
      - redis-master
      - postgres
    networks:
      - numu-stage
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  celery-beat:
    image: ${NUMU_API_IMAGE:?NUMU_API_IMAGE must be set}
    container_name: numu-celery-beat-stage
    restart: unless-stopped
    command: celery -A src.infrastructure.messaging.celery_app beat --loglevel=info
    env_file:
      - ../.env.stage
    environment:
      - ENVIRONMENT=staging
      - LOG_FORMAT=json
      - PROCESS_ROLE=celery
    depends_on:
      - redis-master
      - postgres
    networks:
      - numu-stage

  storefront:
    image: ${NUMU_STOREFRONT_IMAGE:?NUMU_STOREFRONT_IMAGE must be set}
    container_name: numu-storefront-stage
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      # SSR base for store-by-subdomain + product lookups. Storefront code
      # appends `/api/v1`, so this must be the **root** (no `/api/v1`).
      # Internal Docker DNS hop — skips CF + nginx, keeps SSR fetches in-cluster.
      - NUMU_API_URL=http://numu-api-stage:8000
    networks:
      - numu-edge
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  numu-stage:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
  numu-edge:
    external: true

volumes:
  postgres_data:
    driver: local
  postgres_wal_archive:
    driver: local
  redis_master_data:
    driver: local
  minio_data:
    driver: local
  api_logs:
    driver: local
