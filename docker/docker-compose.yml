services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=numu
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - numu-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=numu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - numu-network

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - numu-network

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.infrastructure.messaging.celery_app worker --loglevel=info
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - PROCESS_ROLE=celery
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=numu
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - JWT_ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - numu-network

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A src.infrastructure.messaging.celery_app beat --loglevel=info
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - PROCESS_ROLE=celery
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=numu
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - JWT_ALGORITHM=HS256
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - numu-network

  # ===========================================================================
  # Nominatim — self-hosted reverse-geocoder for the storefront checkout
  # location picker. Behind the `geocoding` profile so `docker compose up`
  # doesn't block on a ~30min OSM import unless explicitly requested.
  #
  #   docker compose --profile geocoding up nominatim
  #
  # First startup downloads the Egypt extract (~200MB) and imports it into
  # the container's internal Postgres (~5GB on disk). Subsequent startups
  # re-attach the named volume and come up in seconds. REPLICATION_URL +
  # UPDATE_MODE=continuous keeps the data current via OSM daily diffs —
  # no Celery task needed.
  #
  # To point the API at it, set in the api service env:
  #   NOMINATIM_URL=http://nominatim:8080
  # Leave LOCATIONIQ_KEY unset — the route skips the `key` query param
  # when it's empty and calls Nominatim directly.
  # ===========================================================================
  nominatim:
    image: mediagis/nominatim:4.4
    profiles: ["geocoding"]
    environment:
      - PBF_URL=https://download.geofabrik.de/africa/egypt-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/africa/egypt-updates/
      - UPDATE_MODE=continuous
      - IMPORT_WIKIPEDIA=false
      - IMPORT_US_POSTCODES=false
      - IMPORT_GB_POSTCODES=false
      - FREEZE=false
      - THREADS=4
      - NOMINATIM_PASSWORD=numu-nominatim-dev
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
      - nominatim_flatnode:/nominatim/flatnode
    ports:
      - "7070:8080"
    shm_size: 1gb
    restart: unless-stopped
    networks:
      - numu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      start_period: 40m   # first-time import window
      retries: 5

volumes:
  postgres_data:
  redis_data:
  nominatim_data:
  nominatim_flatnode:

networks:
  numu-network:
    driver: bridge
