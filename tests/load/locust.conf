# =============================================================================
# NUMU API — Locust default configuration
# =============================================================================
# This file is loaded automatically when locust is run from this directory.
# Override any value with CLI flags or environment variables (LOCUST_*).
#
# Profiles (override via CLI):
#   Smoke:  --users 10  --spawn-rate 2   --run-time 1m
#   Load:   --users 100 --spawn-rate 10  --run-time 5m
#   Stress: --users 500 --spawn-rate 25  --run-time 10m
# =============================================================================

# Target host (override with --host or LOCUST_HOST)
host = http://localhost:8021

# Default: load profile
users = 100
spawn-rate = 10
run-time = 5m

# Locustfile path (relative to repo root)
locustfile = tests/load/locustfile.py

# Headless by default in CI; use `locust --web-ui` to override
headless = true

# Export results
csv = tests/load/results/load
html = tests/load/results/report.html

# Logging
loglevel = INFO
logfile = tests/load/results/locust.log
