# Alembic Configuration

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Set to true to prepend the current date to the migration filename
prepend_date = false

# Timezone for migration file timestamps
# timezone =

# Max length of characters for the slug field
truncate_slug_length = 40

# Set to true to append a trailing newline
revision_environment = false

# Set to true to require a non-empty message
# sourceless = false

# Set to true to display version numbers
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# Separators used for version paths
# version_path_separator = os

# Output encoding for file operations
output_encoding = utf-8

# The database URL (will be overridden by env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Hooks for formatting migrations after generation

# Uncomment to format with Black
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Uncomment to format with Ruff
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
